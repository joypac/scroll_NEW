<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miguel Ortigão — Arquitetura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Clash Display';
      src: url('ClashDisplay-Medium.ttf') format('truetype');
      font-style: normal;
      font-weight: 500;
    }

    @font-face {
      font-family: 'Neue Montreal';
      src: url('PPNeueMontreal-Book.otf') format('opentype');
      font-style: normal;
      font-weight: 400;
    }

    @font-face {
      font-family: 'Walter Neue';
      src: url('ABCWalterNeue-Regular-Trial.otf') format('opentype');
      font-style: normal;
      font-weight: 400;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    img, video {
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    ::selection {
      background: transparent;
    }

    ::-moz-selection {
      background: transparent;
    }

    body {
      background: #f5f5f3;
      overflow-x: clip;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
    }

    /* ── Mosaic ───────────────────────────────────────────── */

    /*
      3-column grid. Rows size to content (grid-auto-rows: auto).
      align-items: start → cells shrink-wrap their image; no stretching.
      gap: 1px           → hairline separator between cells.
      Images: width 100%, height auto → preserves ratio, no crop.
    */

    #mosaic, .mosaic-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: auto;
      align-items: start;
      gap: 1px;
      background: #f5f5f3;
    }

    .mosaic-cell {
      position: relative;
      background: #f5f5f3;
      overflow: visible;
    }

    .mosaic-cell.align-bottom {
      align-self: start;
    }

    /* Offset middle column so each tile center aligns near side-column tile edges. */
    .mosaic-grid > .mosaic-cell:nth-child(3n + 2),
    #mosaic > .mosaic-cell:nth-child(3n + 2) {
      transform: translateY(-50%);
    }

    /* Same margins for images and videos, with stable vertical rhythm and no crop. */
    .mosaic-cell img,
    .mosaic-cell video {
      display: block;
      width: calc(100% - 20% - 10px);
      margin-left: calc(10% + 5px);
      margin-right: calc(10% + 5px);
      margin-top: clamp(9px, 1.35vw, 23px);
      margin-bottom: clamp(9px, 1.35vw, 23px);
      height: auto;
    }

    /* No hover effects */
    .mosaic-label {
      display: none;
    }

  </style>
</head>
<body>

<div id="site-shell">
  <div id="mosaic"></div>
  <div id="scroll-sentinel"></div>
</div>

<script>
  /* ── Data ─────────────────────────────────────────────────
     Format notes:
       HEIC → Safari/macOS/iOS only
       TIF  → not supported by browsers (convert to JPG)
       MOV  → Safari + Chrome (H.264); may fail on Firefox
  ── */

  var projects = [
    {
      name: 'banco',
      media: [
        { src: 'BANCO1.jpg', type: 'img' },
        { src: 'BANCO2.jpg', type: 'img' },
        { src: 'BANCO3.jpg', type: 'img' }
      ]
    },
    {
      name: 'fairly',
      media: [
        { src: 'fairly1.jpg',   type: 'img' },
        { src: 'fairly2.jpg',   type: 'img' },
        { src: 'fairly3.jpg',   type: 'img' },
        { src: 'fairly5.jpg',   type: 'img' },
        { src: 'FAIRLY9.jpg',   type: 'img' },
        { src: 'FAIRLY10.jpg',  type: 'img' },
        { src: 'FAIRLY11.jpg',  type: 'img' },
        { src: 'FAIRLY12.jpg',  type: 'img' },
        { src: 'FAIRLY13.jpg',  type: 'img' },
        { src: 'FAIRLY16.jpg',  type: 'img' },
        { src: 'FAIRLY17.jpg',  type: 'img' },
        { src: 'FAIRLY31.jpg', type: 'img' },
        { src: 'FAIRLY32.jpg', type: 'img' },
        { src: 'FAIRLY33.jpg', type: 'img' },
        { src: 'FAIRLY34.jpg', type: 'img' },
        { src: 'FAIRLY35.jpg', type: 'img' },
        { src: 'FAIRLY36.jpg', type: 'img' },
        { src: 'FAIRLY37.jpg', type: 'img' },
        { src: 'FAIRLY38.jpg', type: 'img' },
        { src: 'FAIRLY39.jpg', type: 'img' },
        { src: 'FAIRLY41.jpg', type: 'img' },
        { src: 'FAIRLY42.jpg', type: 'img' },
        { src: 'FAIRLY43.jpg', type: 'img' },
        { src: 'FAIRLY18.mov',  type: 'vid' },
        { src: 'FAIRLY19.mov',  type: 'vid' },
        { src: 'FAIRLY20.mov',  type: 'vid' },
        { src: 'FAIRLY21.mov',  type: 'vid' },
        { src: 'FAIRLY22.mov',  type: 'vid' },
        { src: 'FAIRLY23.mov',  type: 'vid' },
        { src: 'FAIRLY24.mov',  type: 'vid' },
        { src: 'FAIRLY25.mov',  type: 'vid' },
        { src: 'FAIRLY26.mov',  type: 'vid' },
        { src: 'FAIRLY27.MOV',  type: 'vid' },
        { src: 'FAIRLY28.MOV',  type: 'vid' },
        { src: 'FAIRLY30.MOV',  type: 'vid' }
      ]
    },
    {
      name: 'mustique',
      media: [
        { src: 'mustique1.jpg',   type: 'img' },
        { src: 'mustique2.jpg',   type: 'img' },
        { src: 'mustique3.jpg',   type: 'img' },
        { src: 'mustique4.jpg',   type: 'img' },
        { src: 'mustique5.jpg',   type: 'img' },
        { src: 'MUSTIQUE7.jpg',  type: 'img' },
        { src: 'MUSTIQUE9.jpg',  type: 'img' },
        { src: 'MUSTIQUE13.jpg', type: 'img' },
        { src: 'MUSTIQUE14.jpg', type: 'img' },
        { src: 'MUSTIQUE15.jpg', type: 'img' },
        { src: 'MUSTIQUE16.jpg', type: 'img' },
        { src: 'MUSTIQUE17.jpg', type: 'img' },
        { src: 'MUSTIQUE18.jpg', type: 'img' },
        { src: 'MUSTIQUE19.jpg', type: 'img' },
        { src: 'MUSTIQUE20.jpg', type: 'img' },
        { src: 'MUSTIQUE21.jpg', type: 'img' },
        { src: 'MUSTIQUE22.jpg', type: 'img' },
        { src: 'MUSTIQUE23.jpg', type: 'img' },
        { src: 'MUSTIQUE24.jpg', type: 'img' },
        { src: 'MUSTIQUE27.jpg', type: 'img' },
        { src: 'MUSTIQUE28.jpg', type: 'img' },
        { src: 'MUSTIQUE29.jpg', type: 'img' }
      ]
    },
    {
      name: 'paez',
      media: [
        { src: 'paez1.jpg',       type: 'img' },
        { src: 'paez2.jpg',       type: 'img' },
        { src: 'paez3.jpg',       type: 'img' },
        { src: 'paez4.jpg',       type: 'img' },
        { src: 'paez5.jpg',       type: 'img' },
        { src: 'PAEZ8.jpg',   type: 'img' },
        { src: 'PAEZ9.jpg',   type: 'img' },
        { src: 'PAEZ10.jpg',  type: 'img' },
        { src: 'PAEZ11.jpg',  type: 'img' },
        { src: 'PAEZ12.jpg',  type: 'img' },
        { src: 'PAEZ13.jpg',  type: 'img' },
        { src: 'PAEZ14.jpg',  type: 'img' },
        { src: 'PAEZ15.jpg',  type: 'img' },
        { src: 'PAEZ16.jpg',  type: 'img' },
        { src: 'PAEZ17.jpg',  type: 'img' },
        { src: 'PAEZ18.jpg',  type: 'img' },
        { src: 'PAEZ19.jpg',  type: 'img' },
        { src: 'paez_video1.mp4', type: 'vid' },
        { src: 'paez_video2.mp4', type: 'vid' },
        { src: 'paez_video3.mp4', type: 'vid' },
        { src: 'paez_video4.mp4', type: 'vid' },
        { src: 'paez_video5.mp4', type: 'vid' },
        { src: 'paez_video6.mp4', type: 'vid' }
      ]
    },
    {
      name: 'peça',
      media: [
        { src: 'PEÇA1.jpg', type: 'img' },
        { src: 'PECA2.jpg', type: 'img' },
        { src: 'PEÇA3.jpg', type: 'img' }
      ]
    },
    {
      name: 'lapa lofts',
      media: [
        { src: 'LAPA_LOFTS.MOV', type: 'vid' }
      ]
    }
  ];

  /* ── Helpers ──────────────────────────────────────────── */

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var DIRS = [[-1,0],[1,0],[0,-1],[0,1]];

  /* ── Compact grid builder ─────────────────────────────────
     Fills a COLS×ROWS grid completely with project indices.
     No empty cells. Uses multi-source BFS with an anti-snake
     heuristic: prefer expanding into cells that already have
     2+ project neighbours (makes blobs, not tendrils).
  ── */

  function buildGrid(projects, displayedMedia, COLS) {
    var total = projects.reduce(function(s, p) { return s + p.media.length; }, 0);
    var ROWS  = Math.ceil(total / COLS);

    // grid[r][c] = project index, -1 = empty
    var grid = [];
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) row.push(-1);
      grid.push(row);
    }

    // Shuffle project order and plant spaced-out seeds
    var order   = shuffle(projects.map(function(_, i) { return i; }));
    var step    = Math.max(1, Math.floor(ROWS / projects.length));

    order.forEach(function(pi, oi) {
      var r = Math.min(oi * step, ROWS - 1);
      var c = Math.floor(Math.random() * COLS);
      for (var i = 0; i < ROWS * COLS; i++) {
        if (grid[r][c] === -1) { grid[r][c] = pi; return; }
        c = (c + 1) % COLS;
        if (c === 0) r = (r + 1) % ROWS;
      }
    });

    // Count placed seeds
    var counts = projects.map(function(_, pi) {
      var n = 0;
      for (var r = 0; r < ROWS; r++)
        for (var c = 0; c < COLS; c++)
          if (grid[r][c] === pi) n++;
      return n;
    });

    // Expand all projects round-robin until each hits its quota
    var growing = true;
    while (growing) {
      growing = false;
      order.forEach(function(pi) {
        if (counts[pi] >= projects[pi].media.length) return;

        // Build scored frontier (adjacent empty cells)
        var frontier = [], seen = {};
        for (var r = 0; r < ROWS; r++) {
          for (var c = 0; c < COLS; c++) {
            if (grid[r][c] !== pi) continue;
            for (var di = 0; di < DIRS.length; di++) {
              var nr = r + DIRS[di][0], nc = c + DIRS[di][1];
              var key = nr + ',' + nc;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
              if (grid[nr][nc] !== -1 || seen[key]) continue;
              seen[key] = true;
              // Score = number of existing pi-neighbours (anti-snake: prefer pockets)
              var score = 0;
              for (var dj = 0; dj < DIRS.length; dj++) {
                var ar = nr + DIRS[dj][0], ac = nc + DIRS[dj][1];
                if (ar >= 0 && ar < ROWS && ac >= 0 && ac < COLS && grid[ar][ac] === pi) score++;
              }
              frontier.push([nr, nc, score]);
            }
          }
        }

        var pick;
        if (frontier.length > 0) {
          // Pick from cells with the highest score (most neighbours = blobby, not snake)
          frontier.sort(function(a, b) { return b[2] - a[2]; });
          var best = frontier[0][2];
          var top  = [];
          for (var i = 0; i < frontier.length && frontier[i][2] === best; i++) top.push(frontier[i]);
          pick = top[Math.floor(Math.random() * top.length)];
        } else {
          // Completely surrounded — pick any remaining empty cell (fallback)
          var any = [];
          for (var r = 0; r < ROWS; r++)
            for (var c = 0; c < COLS; c++)
              if (grid[r][c] === -1) any.push([r, c, 0]);
          if (any.length === 0) return;
          pick = any[Math.floor(Math.random() * any.length)];
        }

        grid[pick[0]][pick[1]] = pi;
        counts[pi]++;
        growing = true;
      });
    }

    // Flood-fill any remaining empty cells with the nearest project
    // (at most COLS-1 cells can remain unfilled if total % COLS !== 0)
    var changed = true;
    while (changed) {
      changed = false;
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (grid[r][c] !== -1) continue;
          for (var di = 0; di < DIRS.length; di++) {
            var nr = r + DIRS[di][0], nc = c + DIRS[di][1];
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] !== -1) {
              grid[r][c] = grid[nr][nc];
              changed = true;
              break;
            }
          }
        }
      }
    }

    return { grid: grid, rows: ROWS, cols: COLS };
  }

  /* ── Render ───────────────────────────────────────────── */

  // Shared IntersectionObserver for all video tiles across all grids
  var vidObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      var v = e.target.querySelector('video');
      if (!v) return;
      if (e.isIntersecting) v.play().catch(function() {});
      else v.pause();
    });
  }, { threshold: 0.15 });

  function buildMosaicLayout(container) {
    var COLS = 3;
    var displayedMedia = projects.map(function(p) { return shuffle(p.media); });
    var layout = buildGrid(projects, displayedMedia, COLS);
    var grid = layout.grid, ROWS = layout.rows;

    // Per project, compute vertical center of its blob in this generated layout.
    var rowStats = projects.map(function() {
      return { min: Infinity, max: -Infinity };
    });

    for (var rr = 0; rr < ROWS; rr++) {
      for (var cc = 0; cc < COLS; cc++) {
        var pidx = grid[rr][cc];
        if (pidx < 0) continue;
        if (rr < rowStats[pidx].min) rowStats[pidx].min = rr;
        if (rr > rowStats[pidx].max) rowStats[pidx].max = rr;
      }
    }

    var projectCenterRow = rowStats.map(function(s) {
      if (s.min === Infinity) return 0;
      return (s.min + s.max) / 2;
    });

    var imgIdx = projects.map(function() { return 0; });

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var pi  = grid[r][c];
        var idx = imgIdx[pi]++;
        var media = displayedMedia[pi];

        if (idx >= media.length) {
          container.appendChild(document.createElement('div'));
          continue;
        }

        var item = media[idx];
        var div  = document.createElement('div');
        div.className = 'mosaic-cell' + (item.type === 'vid' ? ' is-video' : '');

        // Keep each project visually compact: top rows hug down, bottom rows hug up.
        if (r < projectCenterRow[pi]) {
          div.classList.add('align-bottom');
        }

        if (item.type === 'vid') {
          var video = document.createElement('video');
          video.muted = true;
          video.loop  = true;
          video.setAttribute('playsinline', '');
          video.setAttribute('preload', 'metadata');
          var vsrc = document.createElement('source');
          vsrc.src = item.src;
          video.appendChild(vsrc);
          div.appendChild(video);
          vidObs.observe(div);
        } else {
          var img = document.createElement('img');
          img.src      = item.src;
          img.alt      = projects[pi].name;
          img.loading  = 'lazy';
          img.decoding = 'async';
          div.appendChild(img);
        }

        var label = document.createElement('span');
        label.className   = 'mosaic-label';
        label.textContent = projects[pi].name;
        div.appendChild(label);

        container.appendChild(div);
      }
    }
  }

  // First grid
  buildMosaicLayout(document.getElementById('mosaic'));

  // Infinite scroll: append a new randomised grid when sentinel comes into view
  var sentinel = document.getElementById('scroll-sentinel');
  var appending = false;

  function appendGrid() {
    if (appending) return;
    appending = true;
    var grid = document.createElement('div');
    grid.className = 'mosaic-grid';
    sentinel.parentNode.insertBefore(grid, sentinel);
    buildMosaicLayout(grid);
    appending = false;
  }

  function dynamicRootMargin() {
    return Math.max(400, Math.round(window.innerHeight * 1.5)) + 'px';
  }

  var infiniteObs = null;
  function setupInfiniteObserver() {
    if (infiniteObs) infiniteObs.disconnect();
    infiniteObs = new IntersectionObserver(function(entries) {
      if (!entries[0].isIntersecting) return;
      appendGrid();
    }, { rootMargin: dynamicRootMargin() });
    infiniteObs.observe(sentinel);
  }

  setupInfiniteObserver();

  // Keeps enough content ahead so frame jumps do not hit the page end.
  function ensureContentAhead(minAheadPx) {
    var maxScroll = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    var remaining = maxScroll - window.scrollY;
    var attempts = 0;

    while (remaining < minAheadPx && attempts < 3) {
      appendGrid();
      maxScroll = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
      remaining = maxScroll - window.scrollY;
      attempts++;
    }
  }

  var FrameNavigator = (function() {
    var smooth = false;
    var lockUntil = 0;
    var lockTimer = 0;
    var lockMsSmooth = 460;
    var lockMsInstant = 90;
    var touchStartY = 0;
    var touchStartX = 0;
    var touchMoved = false;
    var lastTouchNavTs = 0;
    var resizeTimer = 0;

    function viewportStep() {
      return Math.max(1, window.innerHeight || 1);
    }

    function maxScrollY() {
      return Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    }

    function lockForTransition() {
      var now = Date.now();
      var ms = smooth ? lockMsSmooth : lockMsInstant;
      lockUntil = now + ms;
      clearTimeout(lockTimer);
      lockTimer = setTimeout(function() {
        lockUntil = 0;
      }, ms + 20);
    }

    function isLocked() {
      return Date.now() < lockUntil;
    }

    function scrollToY(yTarget) {
      window.scrollTo({
        top: yTarget,
        behavior: smooth ? 'smooth' : 'auto'
      });
    }

    function goByDirection(direction) {
      if (isLocked()) return;

      ensureContentAhead(window.innerHeight * 2.5);

      var step = viewportStep();
      var target = window.scrollY + (direction * step);
      var maxY = maxScrollY();

      if (target < 0) target = 0;
      if (target > maxY) {
        ensureContentAhead(window.innerHeight * 3);
        maxY = maxScrollY();
        target = Math.min(target, maxY);
      }

      lockForTransition();
      scrollToY(target);
    }

    function goDown() {
      goByDirection(1);
    }

    function goUp() {
      goByDirection(-1);
    }

    function snapToNearestFrame() {
      var step = viewportStep();
      var current = window.scrollY;
      var snapped = Math.round(current / step) * step;
      var maxY = maxScrollY();
      if (snapped > maxY) snapped = maxY;

      var previousSmooth = smooth;
      smooth = false;
      scrollToY(snapped);
      smooth = previousSmooth;
    }

    function onWheel(e) {
      e.preventDefault();
      // Wheel scrolling is fully disabled by request.
    }

    function onClick(e) {
      // Ignore synthetic click right after touch navigation.
      if (Date.now() - lastTouchNavTs < 420) return;
      if (e.button !== 0) return;
      if (e.defaultPrevented) return;

      var target = e.target;
      if (target && target.closest && target.closest('a, button, input, textarea, select, label')) return;
      goDown();
    }

    function onTouchStart(e) {
      if (!e.touches || !e.touches[0]) return;
      touchMoved = false;
      touchStartY = e.touches[0].clientY;
      touchStartX = e.touches[0].clientX;
    }

    function onTouchMove(e) {
      if (!e.touches || !e.touches[0]) return;
      var dy = e.touches[0].clientY - touchStartY;
      var dx = e.touches[0].clientX - touchStartX;
      if (Math.abs(dy) > 8 || Math.abs(dx) > 8) touchMoved = true;
      // Block native continuous scroll to keep frame-based navigation.
      e.preventDefault();
    }

    function onTouchEnd(e) {
      if (!e.changedTouches || !e.changedTouches[0]) return;
      var dy = e.changedTouches[0].clientY - touchStartY;
      var absDy = Math.abs(dy);

      // Swipe/drag scrolling is disabled. Only a simple tap advances one frame.
      if (!touchMoved && absDy < 10) {
        goDown();
      }

      lastTouchNavTs = Date.now();
    }

    function onKeydown(e) {
      if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
        e.preventDefault();
        goDown();
      } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
        e.preventDefault();
        goUp();
      } else if (e.key === 'Home') {
        e.preventDefault();
        lockForTransition();
        scrollToY(0);
      } else if (e.key === 'End') {
        e.preventDefault();
        ensureContentAhead(window.innerHeight * 3);
        lockForTransition();
        scrollToY(maxScrollY());
      }
    }

    function onResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function() {
        setupInfiniteObserver();
        ensureContentAhead(window.innerHeight * 2.5);
        snapToNearestFrame();
      }, 140);
    }

    function init() {
      ensureContentAhead(window.innerHeight * 2.5);
      window.addEventListener('wheel', onWheel, { passive: false });
      document.addEventListener('click', onClick, { passive: true });
      window.addEventListener('touchstart', onTouchStart, { passive: true });
      window.addEventListener('touchmove', onTouchMove, { passive: false });
      window.addEventListener('touchend', onTouchEnd, { passive: true });
      window.addEventListener('keydown', onKeydown);
      window.addEventListener('resize', onResize, { passive: true });
      window.addEventListener('orientationchange', onResize, { passive: true });
    }

    return {
      init: init,
      goDown: goDown,
      goUp: goUp,
      setSmooth: function(value) {
        smooth = !!value;
      },
      isSmooth: function() {
        return smooth;
      }
    };
  })();

  FrameNavigator.init();
  window.FrameNavigator = FrameNavigator;

  // Prevent accidental drag/select highlight overlays on repeated taps/clicks.
  document.addEventListener('dragstart', function(e) {
    var t = e.target;
    if (t && t.closest && t.closest('img, video')) e.preventDefault();
  });

  document.addEventListener('selectstart', function(e) {
    var t = e.target;
    if (t && t.closest && t.closest('img, video, .mosaic-cell')) e.preventDefault();
  });

  window.addEventListener('pointerup', function() {
    if (window.getSelection) {
      var sel = window.getSelection();
      if (sel && sel.removeAllRanges) sel.removeAllRanges();
    }
  }, { passive: true });
</script>
