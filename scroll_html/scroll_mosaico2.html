<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miguel Ortigão — Arquitetura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Clash Display';
      src: url('ClashDisplay-Medium.ttf') format('truetype');
      font-style: normal;
      font-weight: 500;
    }

    @font-face {
      font-family: 'Neue Montreal';
      src: url('PPNeueMontreal-Book.otf') format('opentype');
      font-style: normal;
      font-weight: 400;
    }

    @font-face {
      font-family: 'Walter Neue';
      src: url('ABCWalterNeue-Regular-Trial.otf') format('opentype');
      font-style: normal;
      font-weight: 400;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --door-ease: cubic-bezier(0.22, 1, 0.36, 1);
      --door-left: 16px;
      --door-top: 33.335vh;
      --door-height: 33.33vh;
    }

    body {
      background: #f5f5f3;
      overflow-x: clip;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
    }

    #contact-backdrop {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 40;
      transition: opacity 0.7s var(--door-ease);
    }

    body.drawer-open #contact-backdrop {
      opacity: 0.5;
    }

    /* ── Door (linha + texto = um elemento que roda) ────────── */

    #door-wrap {
      position: fixed;
      left: var(--door-left);
      top: var(--door-top);
      z-index: 60;
      transform-origin: 0 0;
      transition: transform 0.7s var(--door-ease);
      cursor: pointer;
      user-select: none;
      padding: 0 18px 0 0;
    }

    body.first-auto-close #door-wrap {
      transition-duration: 1.25s;
    }

    body.drawer-open #door-wrap {
      transform: rotate(-90deg);
    }

    #door-line {
      position: relative;
      width: 6px;
      height: var(--door-height);
      background: #111;
    }

    #door-text {
      position: absolute;
      text-align: left;
      left: -120vw;
      top: 0;
      transform: rotate(90deg);
      transform-origin: top left;
      white-space: nowrap;
      pointer-events: none;
      transition: none;
    }

    body.drawer-open #door-text,
    body.door-closing #door-text {
      left: -28px;
      pointer-events: auto;
    }

    .contact-name {
      font-family: 'Walter Neue', sans-serif;
      font-size: 4.9rem;
      font-weight: 500;
      color: #111;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 1;
    }

    .contact-role {
      font-family: 'Walter Neue', sans-serif;
      font-size: 2.1rem;
      font-weight: 500;
      color: #111;
      letter-spacing: normal;
      text-transform: uppercase;
      margin: 6px 0 1rem;
    }

    .contact-link {
      display: block;
      font-family: 'Neue Montreal', sans-serif;
      font-size: 2.45rem;
      color: #111;
      text-decoration: none;
      line-height: 1.35;
      transition: opacity 0.2s;
    }

    .contact-link:hover { opacity: 0.5; }

    /* ── Mosaic ───────────────────────────────────────────── */

    /*
      3-column grid. Rows size to content (grid-auto-rows: auto).
      align-items: start → cells shrink-wrap their image; no stretching.
      gap: 1px           → hairline separator between cells.
      Images: width 100%, height auto → preserves ratio, no crop.
    */

    #mosaic, .mosaic-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: auto;
      align-items: stretch;
      gap: 1px;
      background: #f5f5f3;
    }

    .mosaic-cell {
      position: relative;
      display: flex;
      justify-content: center;
      background: #f5f5f3;
      overflow: hidden;
    }

    .mosaic-cell.align-top { align-items: flex-start; }
    .mosaic-cell.align-bottom { align-items: flex-end; }

    /* Center column offset: image pushed down, no crop */
    .mosaic-cell.center-column { padding-top: 20vw; align-items: flex-start; }

    .mosaic-media {
      /* width set randomly in JS: 65%–80% of cell (≥10% margin each side) */
      --auto-nudge-y: 0px;
      transform: translateY(var(--auto-nudge-y));
      margin: 6px 0;
    }

    /* Images and videos: full width, natural height — no crop, no forced ratio */
    .mosaic-media img,
    .mosaic-media video {
      display: block;
      width: 100%;
      height: auto;
    }

    /* No hover effects */
    .mosaic-label {
      display: none;
    }

    @media (max-width: 720px) {
      .contact-name { font-size: 3.325rem; }
      .contact-role { font-size: 1.6625rem; }
      .contact-link { font-size: 1.75rem; }
    }
  </style>
</head>

<script>
  /* ── Data ─────────────────────────────────────────────────
     Format notes:
       HEIC → Safari/macOS/iOS only

  var projects = [
    {

        { src: 'FAIRLY19.mov',  type: 'vid' },
        { src: 'FAIRLY20.mov',  type: 'vid' },
        { src: 'FAIRLY21.mov',  type: 'vid' },

      ]
    },
    {

        { src: 'paez1.jpg',       type: 'img' },
        { src: 'paez2.jpg',       type: 'img' },
        { src: 'paez3.jpg',       type: 'img' },
        { src: 'paez4.jpg',       type: 'img' },
        { src: 'paez5.jpg',       type: 'img' },
        { src: 'PAEZ8.jpg',   type: 'img' },
        { src: 'PAEZ9.jpg',   type: 'img' },
        { src: 'PAEZ10.jpg',  type: 'img' },
        { src: 'PAEZ11.jpg',  type: 'img' },
        { src: 'PAEZ12.jpg',  type: 'img' },
        { src: 'PAEZ13.jpg',  type: 'img' },
        { src: 'PAEZ14.jpg',  type: 'img' },
        { src: 'PAEZ15.jpg',  type: 'img' },
        { src: 'PAEZ16.jpg',  type: 'img' },
        { src: 'PAEZ17.jpg',  type: 'img' },
        { src: 'PAEZ18.jpg',  type: 'img' },
        { src: 'PAEZ19.jpg',  type: 'img' },
        { src: 'paez_9fev.mov', type: 'vid' }
      ]
    },
    {
      name: 'peça',
      media: [
        { src: 'PEÇA1.jpg', type: 'img' },
        { src: 'PECA2.jpg', type: 'img' },
        { src: 'PEÇA3.jpg', type: 'img' }
      ]
    },
    {
      name: 'lapa lofts',
      media: [
        { src: 'LAPA_LOFTS.MOV', type: 'vid' }
      ]
    }
  ];

  /* ── Helpers ──────────────────────────────────────────── */

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var DIRS = [[-1,0],[1,0],[0,-1],[0,1]];

  /* ── Compact grid builder ─────────────────────────────────
     Fills a COLS×ROWS grid completely with project indices.
     No empty cells. Uses multi-source BFS with an anti-snake
     heuristic: prefer expanding into cells that already have
     2+ project neighbours (makes blobs, not tendrils).
  ── */

  function buildGrid(projects, displayedMedia, COLS) {
    var total = projects.reduce(function(s, p) { return s + p.media.length; }, 0);
    var ROWS  = Math.ceil(total / COLS);

    // grid[r][c] = project index, -1 = empty
    var grid = [];
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) row.push(-1);
      grid.push(row);
    }

    // Shuffle project order and plant spaced-out seeds
    var order   = shuffle(projects.map(function(_, i) { return i; }));
    var step    = Math.max(1, Math.floor(ROWS / projects.length));

    order.forEach(function(pi, oi) {
      var r = Math.min(oi * step, ROWS - 1);
      var c = Math.floor(Math.random() * COLS);
      for (var i = 0; i < ROWS * COLS; i++) {
        if (grid[r][c] === -1) { grid[r][c] = pi; return; }
        c = (c + 1) % COLS;
        if (c === 0) r = (r + 1) % ROWS;
      }
    });

    // Count placed seeds
    var counts = projects.map(function(_, pi) {
      var n = 0;
      for (var r = 0; r < ROWS; r++)
        for (var c = 0; c < COLS; c++)
          if (grid[r][c] === pi) n++;
      return n;
    });

    // Expand all projects round-robin until each hits its quota
    var growing = true;
    while (growing) {
      growing = false;
      order.forEach(function(pi) {
        if (counts[pi] >= projects[pi].media.length) return;

        // Build scored frontier (adjacent empty cells)
        var frontier = [], seen = {};
        for (var r = 0; r < ROWS; r++) {
          for (var c = 0; c < COLS; c++) {
            if (grid[r][c] !== pi) continue;
            for (var di = 0; di < DIRS.length; di++) {
              var nr = r + DIRS[di][0], nc = c + DIRS[di][1];
              var key = nr + ',' + nc;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
              if (grid[nr][nc] !== -1 || seen[key]) continue;
              seen[key] = true;
              // Score = number of existing pi-neighbours (anti-snake: prefer pockets)
              var score = 0;
              for (var dj = 0; dj < DIRS.length; dj++) {
                var ar = nr + DIRS[dj][0], ac = nc + DIRS[dj][1];
                if (ar >= 0 && ar < ROWS && ac >= 0 && ac < COLS && grid[ar][ac] === pi) score++;
              }
              frontier.push([nr, nc, score]);
            }
          }
        }

        var pick;
        if (frontier.length > 0) {
          // Pick from cells with the highest score (most neighbours = blobby, not snake)
          frontier.sort(function(a, b) { return b[2] - a[2]; });
          var best = frontier[0][2];
          var top  = [];
          for (var i = 0; i < frontier.length && frontier[i][2] === best; i++) top.push(frontier[i]);
          pick = top[Math.floor(Math.random() * top.length)];
        } else {
          // Completely surrounded — pick any remaining empty cell (fallback)
          var any = [];
          for (var r = 0; r < ROWS; r++)
            for (var c = 0; c < COLS; c++)
              if (grid[r][c] === -1) any.push([r, c, 0]);
          if (any.length === 0) return;
          pick = any[Math.floor(Math.random() * any.length)];
        }

        grid[pick[0]][pick[1]] = pi;
        counts[pi]++;
        growing = true;
      });
    }

    // Flood-fill any remaining empty cells with the nearest project
    // (at most COLS-1 cells can remain unfilled if total % COLS !== 0)
    var changed = true;
    while (changed) {
      changed = false;
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (grid[r][c] !== -1) continue;
          for (var di = 0; di < DIRS.length; di++) {
            var nr = r + DIRS[di][0], nc = c + DIRS[di][1];
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] !== -1) {
              grid[r][c] = grid[nr][nc];
              changed = true;
              break;
            }
          }
        }
      }
    }

    return { grid: grid, rows: ROWS, cols: COLS };
  }

  /* ── Render ───────────────────────────────────────────── */

  // Shared IntersectionObserver for all video tiles across all grids
  var vidObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      var v = e.target.querySelector('video');
      if (!v) return;
      if (e.isIntersecting) v.play().catch(function() {});
      else v.pause();
    });
  }, { threshold: 0.15 });

  function buildMosaicLayout(container) {
    var COLS = 3;
    var displayedMedia = projects.map(function(p) { return shuffle(p.media); });
    var layout = buildGrid(projects, displayedMedia, COLS);
    var grid = layout.grid, ROWS = layout.rows;

    // For each project, compute the vertical span center of its blob in this grid.
    var projectRows = projects.map(function() { return { min: Infinity, max: -Infinity }; });
    for (var rr = 0; rr < ROWS; rr++) {
      for (var cc = 0; cc < COLS; cc++) {
        var pIndex = grid[rr][cc];
        if (pIndex < 0) continue;
        if (rr < projectRows[pIndex].min) projectRows[pIndex].min = rr;
        if (rr > projectRows[pIndex].max) projectRows[pIndex].max = rr;
      }
    }

    var projectCenters = projectRows.map(function(span) {
      if (!isFinite(span.min) || !isFinite(span.max)) return 0;
      return (span.min + span.max) / 2;
    });

    var imgIdx = projects.map(function() { return 0; });

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var pi  = grid[r][c];
        var idx = imgIdx[pi]++;
        var media = displayedMedia[pi];

        if (idx >= media.length) {
          container.appendChild(document.createElement('div'));
          continue;
        }

        var item = media[idx];
        var div  = document.createElement('div');
        div.className = 'mosaic-cell' + (item.type === 'vid' ? ' is-video' : '');
        if (c === 1) div.classList.add('center-column');
        var center = projectCenters[pi];
        div.classList.add(r <= center ? 'align-bottom' : 'align-top');

        var mediaWrap = document.createElement('div');
        mediaWrap.className = 'mosaic-media';
        // Random width: 82%–90% of cell → always ≥5% margin each side, ±15% variation
        mediaWrap.style.width = (82 + Math.random() * 8).toFixed(1) + '%';

        if (item.type === 'vid') {
          var video = document.createElement('video');
          video.muted = true;
          video.loop  = true;
          video.setAttribute('playsinline', '');
          video.setAttribute('preload', 'metadata');
          var vsrc = document.createElement('source');
          vsrc.src = item.src;
          video.appendChild(vsrc);
          mediaWrap.appendChild(video);
          div.appendChild(mediaWrap);
          vidObs.observe(div);
          video.addEventListener('loadedmetadata', function() {
            scheduleTinyGapFix(container, COLS);
          }, { once: true });
        } else {
          var img = document.createElement('img');
          img.src      = item.src;
          img.alt      = projects[pi].name;
          img.loading  = 'lazy';
          img.decoding = 'async';
          img.addEventListener('load', function() {
            scheduleTinyGapFix(container, COLS);
          }, { once: true });
          mediaWrap.appendChild(img);
          div.appendChild(mediaWrap);
        }

        var label = document.createElement('span');
        label.className   = 'mosaic-label';
        label.textContent = projects[pi].name;
        div.appendChild(label);

        container.appendChild(div);
      }
    }

    scheduleTinyGapFix(container, COLS);
  }

  function scheduleTinyGapFix(container, cols) {
    requestAnimationFrame(function() {
      resolveTinyVerticalGaps(container, cols);
    });
  }

  // If two media edges end up separated by a tiny slit, force contact/1px overlap.
  function resolveTinyVerticalGaps(container, cols) {
    var cells = container.querySelectorAll('.mosaic-cell');
    if (!cells.length) return;

    // Reset any previous correction before measuring.
    var wraps = container.querySelectorAll('.mosaic-media');
    wraps.forEach(function(w) {
      w.style.setProperty('--auto-nudge-y', '0px');
    });

    for (var c = 0; c < cols; c++) {
      for (var r = 0; ; r++) {
        var topIndex = r * cols + c;
        var bottomIndex = (r + 1) * cols + c;
        if (bottomIndex >= cells.length) break;

        var topCell = cells[topIndex];
        var bottomCell = cells[bottomIndex];
        if (!topCell || !bottomCell) continue;

        var topMedia = topCell.querySelector('.mosaic-media');
        var bottomMedia = bottomCell.querySelector('.mosaic-media');
        if (!topMedia || !bottomMedia) continue;

        var topRect = topMedia.getBoundingClientRect();
        var bottomRect = bottomMedia.getBoundingClientRect();
        var gap = bottomRect.top - topRect.bottom;

        // Tiny visual seams should become touching (or 1px overlap).
        if (gap > 0 && gap <= 5) {
          bottomMedia.style.setProperty('--auto-nudge-y', (-(gap + 1)).toFixed(2) + 'px');
        }
      }
    }
  }

  // First grid
  buildMosaicLayout(document.getElementById('mosaic'));

  // Infinite scroll: append a new randomised grid when sentinel comes into view
  var sentinel = document.getElementById('scroll-sentinel');
  var appending = false;

  new IntersectionObserver(function(entries) {
    if (!entries[0].isIntersecting || appending) return;
    appending = true;
    var grid = document.createElement('div');
    grid.className = 'mosaic-grid';
    sentinel.parentNode.insertBefore(grid, sentinel);
    buildMosaicLayout(grid);
    appending = false;
  }, { rootMargin: '400px' }).observe(sentinel);

  /* ── Door ─────────────────────────────────────────────── */

  var doorWrap = document.getElementById('door-wrap');
  var isScrollActive = false;
  var hasAutoClosedAfterFirstScroll = false;
  var scrollEndTimer;

  function autoCloseOnFirstUserScroll() {
    if (hasAutoClosedAfterFirstScroll || !isOpen()) return;
    document.body.classList.add('first-auto-close');
    closeDoor();
    hasAutoClosedAfterFirstScroll = true;
  }

  window.addEventListener('scroll', function() {
    isScrollActive = true;
    clearTimeout(scrollEndTimer);
    scrollEndTimer = setTimeout(function() {
      isScrollActive = false;
    }, 160);
  }, { passive: true });

  // Close only on the first real user scroll gesture (not load/layout scroll events).
  window.addEventListener('wheel', autoCloseOnFirstUserScroll, { passive: true });
  window.addEventListener('touchmove', autoCloseOnFirstUserScroll, { passive: true });

  function isOpen()  { return document.body.classList.contains('drawer-open'); }
  function openDoor()  {
    document.body.classList.remove('door-closing');
    document.body.classList.add('drawer-open');
    doorWrap.setAttribute('aria-expanded', 'true');
  }
  function closeDoor() {
    if (!isOpen()) return;
    document.body.classList.add('door-closing');
    document.body.classList.remove('drawer-open');
    doorWrap.setAttribute('aria-expanded', 'false');
  }
  function toggleDoor() { isOpen() ? closeDoor() : openDoor(); }

  doorWrap.addEventListener('transitionend', function(e) {
    if (e.propertyName !== 'transform') return;
    if (!isOpen()) {
      document.body.classList.remove('door-closing');
      document.body.classList.remove('first-auto-close');
    }
  });

  doorWrap.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleDoor();
  });

  doorWrap.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    e.preventDefault();
    toggleDoor();
  });

  document.addEventListener('click', function(e) {
    if (!isOpen()) return;
    if (isScrollActive) return;
    if (doorWrap.contains(e.target)) return;
    closeDoor();
  });

  window.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && isOpen()) closeDoor();
  });
</script>
</body>
</html>
