<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miguel Ortigão — Arquitetura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Clash Display';
      src: url('ClashDisplay-Medium.ttf') format('truetype');
      font-style: normal;
      font-weight: 500;
    }

    @font-face {
      font-family: 'Neue Montreal';
      src: url('PPNeueMontreal-Book.otf') format('opentype');
      font-style: normal;
      font-weight: 400;
    }

    @font-face {
      font-family: 'Walter Neue';
      src: url('ABCWalterNeue-Regular-Trial.otf') format('opentype');
      font-style: normal;
      font-weight: 400;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --door-ease: cubic-bezier(0.22, 1, 0.36, 1);
      --door-left: 16px;
      --door-top: 33.335vh;
      --door-height: 33.33vh;
    }

    body {
      background: #f5f5f3;
      overflow-x: clip;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
    }

    /* ── Door (linha + texto = um elemento que roda) ────────── */

    #door-wrap {
      position: fixed;
      left: var(--door-left);
      top: var(--door-top);
      z-index: 60;
      transform-origin: 0 0;
      transition: transform 0.7s var(--door-ease);
      cursor: pointer;
      user-select: none;
      padding: 0 18px 0 0;
    }

    body.first-auto-close #door-wrap {
      transition-duration: 1.25s;
    }

    body.drawer-open #door-wrap {
      transform: rotate(-90deg);
    }

    #door-line {
      position: relative;
      width: 6px;
      height: var(--door-height);
      background: #111;
    }

    #door-text {
      position: absolute;
      text-align: left;
      left: -120vw;
      top: 0;
      transform: rotate(90deg);
      transform-origin: top left;
      width: min(94vw, 1320px);
      min-height: 90vh;
      white-space: normal;
      padding: 5vh 5vw 4vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 0.15em;
      pointer-events: none;
      transition: none;
    }

    body.drawer-open #door-text,
    body.door-closing #door-text {
      left: -28px;
      pointer-events: auto;
    }

    .contact-name {
      font-family: 'Walter Neue', sans-serif;
      font-size: clamp(3.2rem, 9.2vw, 8.4rem);
      font-weight: 500;
      color: #111;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 0.9;
      white-space: nowrap;
      margin: 0;
      transform: translate(0.3vw, 0.2vh);
    }

    .contact-role {
      font-family: 'Walter Neue', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2.85rem);
      font-weight: 500;
      color: #111;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 1.5vh;
      align-self: flex-end;
      transform: translate(-0.5vw, -0.5vh) rotate(-1.2deg);
    }

    .contact-link {
      display: inline-block;
      font-family: 'Neue Montreal', sans-serif;
      font-size: clamp(1.1rem, 2.2vw, 1.95rem);
      color: #111;
      text-transform: uppercase;
      text-decoration: none;
      line-height: 1.15;
      max-width: 72vw;
      transition: opacity 0.2s;
    }

    #door-text .contact-link:nth-of-type(1) {
      align-self: flex-start;
      margin-top: 0;
      transform: translate(0.8vw, 0) rotate(0deg);
    }

    #door-text .contact-link:nth-of-type(2) {
      align-self: flex-start;
      transform: translate(0.8vw, 0.6vh) rotate(0deg);
    }

    #door-text .contact-link:nth-of-type(3) {
      align-self: flex-start;
      transform: translate(0.8vw, 1.2vh) rotate(0deg);
    }

    .contact-link:hover { opacity: 0.5; }

    /* ── Mosaic ───────────────────────────────────────────── */

    /*
      3-column grid. Rows size to content (grid-auto-rows: auto).
      align-items: start → cells shrink-wrap their image; no stretching.
      gap: 1px           → hairline separator between cells.
      Images: width 100%, height auto → preserves ratio, no crop.
    */

    #mosaic, .mosaic-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: auto;
      align-items: start;
      column-gap: 1px;
      row-gap: 1px;
      background: #f5f5f3;
    }

    .mosaic-cell {
      position: relative;
      background: #f5f5f3;
    }

    /* Stronger per-column staggering to clearly break grid alignment. */
    .mosaic-cell.col-0 { padding-top: 1.6vw; }
    .mosaic-cell.col-1 { padding-top: 6.8vw; }
    .mosaic-cell.col-2 { padding-top: 3.8vw; }

    /* Variable vertical rhythm classes to avoid uniform row spacing. */
    .mosaic-cell.gap-micro { margin-bottom: 3px; }
    .mosaic-cell.gap-normal { margin-bottom: 16px; }
    .mosaic-cell.gap-open { margin-bottom: 34px; }

    .mosaic-media {
      width: var(--media-w, 100%);
      margin-left: auto;
      margin-right: auto;
    }

    .mosaic-media.align-left {
      margin-left: 0;
      margin-right: auto;
    }

    .mosaic-media.align-right {
      margin-left: auto;
      margin-right: 0;
    }

    .mosaic-cell.align-bottom {
      align-self: end;
    }

    /* Images and videos: full width, natural height — no crop, no forced ratio */
    .mosaic-media img,
    .mosaic-media video {
      display: block;
      width: 100%;
      height: auto;
    }

    /* No hover effects */
    .mosaic-label {
      display: none;
    }

    @media (max-width: 720px) {
      #door-text {
        width: 92vw;
        min-height: 82vh;
        padding: 4vh 4vw 3vh;
        gap: 0.2em;
      }
      .contact-name {
        font-size: clamp(2.1rem, 10vw, 3.8rem);
        line-height: 0.92;
      }
      .contact-role {
        font-size: clamp(1rem, 4.3vw, 1.45rem);
        margin: 0 0 1vh;
        transform: translate(-1vw, 0) rotate(-1deg);
      }
      .contact-link {
        font-size: clamp(0.96rem, 4.2vw, 1.3rem);
        max-width: 86vw;
      }
      #door-text .contact-link:nth-of-type(1) {
        transform: translate(0.3vw, 0) rotate(0deg);
      }
      #door-text .contact-link:nth-of-type(2) {
        transform: translate(0.3vw, 0.45vh) rotate(0deg);
      }
      #door-text .contact-link:nth-of-type(3) {
        transform: translate(0.3vw, 0.9vh) rotate(0deg);
      }

      .mosaic-cell.col-0 { padding-top: 1.2vw; }
      .mosaic-cell.col-1 { padding-top: 4.2vw; }
      .mosaic-cell.col-2 { padding-top: 2.5vw; }

      .mosaic-cell.gap-micro { margin-bottom: 2px; }
      .mosaic-cell.gap-normal { margin-bottom: 10px; }
      .mosaic-cell.gap-open { margin-bottom: 18px; }
    }
  </style>
</head>
<body>

<script>
  /* ── Data ─────────────────────────────────────────────────
     Format notes:
       HEIC → Safari/macOS/iOS only
       TIF  → not supported by browsers (convert to JPG)
       MOV  → Safari + Chrome (H.264); may fail on Firefox
  ── */

  var projects = [
    {
      name: 'banco',
      media: [
        { src: 'BANCO1.jpg', type: 'img' },
        { src: 'BANCO2.jpg', type: 'img' },
        { src: 'BANCO3.jpg', type: 'img' }
      ]
    },
    {
      name: 'fairly',
      media: [
        { src: 'fairly1.jpg',   type: 'img' },
        { src: 'fairly2.jpg',   type: 'img' },
        { src: 'fairly3.jpg',   type: 'img' },
        { src: 'fairly5.jpg',   type: 'img' },
        { src: 'FAIRLY9.jpg',   type: 'img' },
        { src: 'FAIRLY10.jpg',  type: 'img' },
        { src: 'FAIRLY11.jpg',  type: 'img' },
        { src: 'FAIRLY12.jpg',  type: 'img' },
        { src: 'FAIRLY13.jpg',  type: 'img' },
        { src: 'FAIRLY16.jpg',  type: 'img' },
        { src: 'FAIRLY17.jpg',  type: 'img' },
        { src: 'FAIRLY31.jpg', type: 'img' },
        { src: 'FAIRLY32.jpg', type: 'img' },
        { src: 'FAIRLY33.jpg', type: 'img' },
        { src: 'FAIRLY34.jpg', type: 'img' },
        { src: 'FAIRLY35.jpg', type: 'img' },
        { src: 'FAIRLY36.jpg', type: 'img' },
        { src: 'FAIRLY37.jpg', type: 'img' },
        { src: 'FAIRLY38.jpg', type: 'img' },
        { src: 'FAIRLY39.jpg', type: 'img' },
        { src: 'FAIRLY41.jpg', type: 'img' },
        { src: 'FAIRLY42.jpg', type: 'img' },
        { src: 'FAIRLY43.jpg', type: 'img' },
        { src: 'FAIRLY18.mov',  type: 'vid' },
        { src: 'FAIRLY19.mov',  type: 'vid' },
        { src: 'FAIRLY20.mov',  type: 'vid' },
        { src: 'FAIRLY21.mov',  type: 'vid' },
        { src: 'FAIRLY22.mov',  type: 'vid' },
        { src: 'FAIRLY23.mov',  type: 'vid' },
        { src: 'FAIRLY24.mov',  type: 'vid' },
        { src: 'FAIRLY25.mov',  type: 'vid' },
        { src: 'FAIRLY26.mov',  type: 'vid' },
        { src: 'FAIRLY27.MOV',  type: 'vid' },
        { src: 'FAIRLY28.MOV',  type: 'vid' },
        { src: 'FAIRLY30.MOV',  type: 'vid' }
      ]
    },
    {
      name: 'mustique',
      media: [
        { src: 'mustique1.jpg',   type: 'img' },
        { src: 'mustique2.jpg',   type: 'img' },
        { src: 'mustique3.jpg',   type: 'img' },
        { src: 'mustique4.jpg',   type: 'img' },
        { src: 'mustique5.jpg',   type: 'img' },
        { src: 'MUSTIQUE7.jpg',  type: 'img' },
        { src: 'MUSTIQUE9.jpg',  type: 'img' },
        { src: 'MUSTIQUE13.jpg', type: 'img' },
        { src: 'MUSTIQUE14.jpg', type: 'img' },
        { src: 'MUSTIQUE15.jpg', type: 'img' },
        { src: 'MUSTIQUE16.jpg', type: 'img' },
        { src: 'MUSTIQUE17.jpg', type: 'img' },
        { src: 'MUSTIQUE18.jpg', type: 'img' },
        { src: 'MUSTIQUE19.jpg', type: 'img' },
        { src: 'MUSTIQUE20.jpg', type: 'img' },
        { src: 'MUSTIQUE21.jpg', type: 'img' },
        { src: 'MUSTIQUE22.jpg', type: 'img' },
        { src: 'MUSTIQUE23.jpg', type: 'img' },
        { src: 'MUSTIQUE24.jpg', type: 'img' },
        { src: 'MUSTIQUE27.jpg', type: 'img' },
        { src: 'MUSTIQUE28.jpg', type: 'img' },
        { src: 'MUSTIQUE29.jpg', type: 'img' }
      ]
    },
    {
      name: 'paez',
      media: [
        { src: 'paez1.jpg',       type: 'img' },
        { src: 'paez2.jpg',       type: 'img' },
        { src: 'paez3.jpg',       type: 'img' },
        { src: 'paez4.jpg',       type: 'img' },
        { src: 'paez5.jpg',       type: 'img' },
        { src: 'PAEZ8.jpg',   type: 'img' },
        { src: 'PAEZ9.jpg',   type: 'img' },
        { src: 'PAEZ10.jpg',  type: 'img' },
        { src: 'PAEZ11.jpg',  type: 'img' },
        { src: 'PAEZ12.jpg',  type: 'img' },
        { src: 'PAEZ13.jpg',  type: 'img' },
        { src: 'PAEZ14.jpg',  type: 'img' },
        { src: 'PAEZ15.jpg',  type: 'img' },
        { src: 'PAEZ16.jpg',  type: 'img' },
        { src: 'PAEZ17.jpg',  type: 'img' },
        { src: 'PAEZ18.jpg',  type: 'img' },
        { src: 'PAEZ19.jpg',  type: 'img' },
        { src: 'paez_9fev.mov', type: 'vid' },
        { src: 'paez_video1.mp4', type: 'vid' },
        { src: 'paez_video2.mp4', type: 'vid' },
        { src: 'paez_video3.mp4', type: 'vid' },
        { src: 'paez_video4.mp4', type: 'vid' },
        { src: 'paez_video5.mp4', type: 'vid' },
        { src: 'paez_video6.mp4', type: 'vid' }
      ]
    },
    {
      name: 'peça',
      media: [
        { src: 'PEÇA1.jpg', type: 'img' },
        { src: 'PECA2.jpg', type: 'img' },
        { src: 'PEÇA3.jpg', type: 'img' }
      ]
    },
    {
      name: 'lapa lofts',
      media: [
        { src: 'LAPA_LOFTS.MOV', type: 'vid' }
      ]
    }
  ];

  /* ── Helpers ──────────────────────────────────────────── */

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  var DIRS = [[-1,0],[1,0],[0,-1],[0,1]];

  /* ── Compact grid builder ─────────────────────────────────
     Fills a COLS×ROWS grid completely with project indices.
     No empty cells. Uses multi-source BFS with an anti-snake
     heuristic: prefer expanding into cells that already have
     2+ project neighbours (makes blobs, not tendrils).
  ── */

  function buildGrid(projects, displayedMedia, COLS) {
    var total = projects.reduce(function(s, p) { return s + p.media.length; }, 0);
    var ROWS  = Math.ceil(total / COLS);

    // grid[r][c] = project index, -1 = empty
    var grid = [];
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) row.push(-1);
      grid.push(row);
    }

    // Shuffle project order and plant spaced-out seeds
    var order   = shuffle(projects.map(function(_, i) { return i; }));
    var step    = Math.max(1, Math.floor(ROWS / projects.length));

    order.forEach(function(pi, oi) {
      var r = Math.min(oi * step, ROWS - 1);
      var c = Math.floor(Math.random() * COLS);
      for (var i = 0; i < ROWS * COLS; i++) {
        if (grid[r][c] === -1) { grid[r][c] = pi; return; }
        c = (c + 1) % COLS;
        if (c === 0) r = (r + 1) % ROWS;
      }
    });

    // Count placed seeds
    var counts = projects.map(function(_, pi) {
      var n = 0;
      for (var r = 0; r < ROWS; r++)
        for (var c = 0; c < COLS; c++)
          if (grid[r][c] === pi) n++;
      return n;
    });

    // Expand all projects round-robin until each hits its quota
    var growing = true;
    while (growing) {
      growing = false;
      order.forEach(function(pi) {
        if (counts[pi] >= projects[pi].media.length) return;

        // Build scored frontier (adjacent empty cells)
        var frontier = [], seen = {};
        for (var r = 0; r < ROWS; r++) {
          for (var c = 0; c < COLS; c++) {
            if (grid[r][c] !== pi) continue;
            for (var di = 0; di < DIRS.length; di++) {
              var nr = r + DIRS[di][0], nc = c + DIRS[di][1];
              var key = nr + ',' + nc;
              if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
              if (grid[nr][nc] !== -1 || seen[key]) continue;
              seen[key] = true;
              // Score = number of existing pi-neighbours (anti-snake: prefer pockets)
              var score = 0;
              for (var dj = 0; dj < DIRS.length; dj++) {
                var ar = nr + DIRS[dj][0], ac = nc + DIRS[dj][1];
                if (ar >= 0 && ar < ROWS && ac >= 0 && ac < COLS && grid[ar][ac] === pi) score++;
              }
              frontier.push([nr, nc, score]);
            }
          }
        }

        var pick;
        if (frontier.length > 0) {
          // Pick from cells with the highest score (most neighbours = blobby, not snake)
          frontier.sort(function(a, b) { return b[2] - a[2]; });
          var best = frontier[0][2];
          var top  = [];
          for (var i = 0; i < frontier.length && frontier[i][2] === best; i++) top.push(frontier[i]);
          pick = top[Math.floor(Math.random() * top.length)];
        } else {
          // Completely surrounded — pick any remaining empty cell (fallback)
          var any = [];
          for (var r = 0; r < ROWS; r++)
            for (var c = 0; c < COLS; c++)
              if (grid[r][c] === -1) any.push([r, c, 0]);
          if (any.length === 0) return;
          pick = any[Math.floor(Math.random() * any.length)];
        }

        grid[pick[0]][pick[1]] = pi;
        counts[pi]++;
        growing = true;
      });
    }

    // Flood-fill any remaining empty cells with the nearest project
    // (at most COLS-1 cells can remain unfilled if total % COLS !== 0)
    var changed = true;
    while (changed) {
      changed = false;
      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          if (grid[r][c] !== -1) continue;
          for (var di = 0; di < DIRS.length; di++) {
            var nr = r + DIRS[di][0], nc = c + DIRS[di][1];
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] !== -1) {
              grid[r][c] = grid[nr][nc];
              changed = true;
              break;
            }
          }
        }
      }
    }

    return { grid: grid, rows: ROWS, cols: COLS };
  }

  /* ── Render ───────────────────────────────────────────── */

  // Shared IntersectionObserver for all video tiles across all grids
  var vidObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      var v = e.target.querySelector('video');
      if (!v) return;
      if (e.isIntersecting) v.play().catch(function() {});
      else v.pause();
    });
  }, { threshold: 0.15 });

  function buildMosaicLayout(container) {
    var COLS = 3;
    var displayedMedia = projects.map(function(p) { return shuffle(p.media); });
    var layout = buildGrid(projects, displayedMedia, COLS);
    var grid = layout.grid, ROWS = layout.rows;

    // Per project, compute vertical center of its blob in this generated layout.
    var rowStats = projects.map(function() {
      return { min: Infinity, max: -Infinity };
    });

    for (var rr = 0; rr < ROWS; rr++) {
      for (var cc = 0; cc < COLS; cc++) {
        var pidx = grid[rr][cc];
        if (pidx < 0) continue;
        if (rr < rowStats[pidx].min) rowStats[pidx].min = rr;
        if (rr > rowStats[pidx].max) rowStats[pidx].max = rr;
      }
    }

    var projectCenterRow = rowStats.map(function(s) {
      if (s.min === Infinity) return 0;
      return (s.min + s.max) / 2;
    });

    var imgIdx = projects.map(function() { return 0; });

    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var pi  = grid[r][c];
        var idx = imgIdx[pi]++;
        var media = displayedMedia[pi];

        if (idx >= media.length) {
          container.appendChild(document.createElement('div'));
          continue;
        }

        var item = media[idx];
        var div  = document.createElement('div');
        div.className = 'mosaic-cell' + (item.type === 'vid' ? ' is-video' : '');
        div.classList.add('col-' + c);

        var gapRoll = Math.random();
        if (gapRoll < 0.3) div.classList.add('gap-micro');
        else if (gapRoll < 0.8) div.classList.add('gap-normal');
        else div.classList.add('gap-open');

        // Keep each project visually compact: top rows hug down, bottom rows hug up.
        if (r < projectCenterRow[pi]) {
          div.classList.add('align-bottom');
        }

        var mediaWrap = document.createElement('div');
        mediaWrap.className = 'mosaic-media';
        mediaWrap.style.setProperty('--media-w', (70 + Math.random() * 22).toFixed(1) + '%');

        var alignRoll = Math.random();
        if (alignRoll < 0.45) mediaWrap.classList.add('align-left');
        else if (alignRoll > 0.55) mediaWrap.classList.add('align-right');

        if (item.type === 'vid') {
          var video = document.createElement('video');
          video.muted = true;
          video.loop  = true;
          video.setAttribute('playsinline', '');
          video.setAttribute('preload', 'metadata');
          var vsrc = document.createElement('source');
          vsrc.src = item.src;
          video.appendChild(vsrc);
          mediaWrap.appendChild(video);
          div.appendChild(mediaWrap);
          vidObs.observe(div);
        } else {
          var img = document.createElement('img');
          img.src      = item.src;
          img.alt      = projects[pi].name;
          img.loading  = 'lazy';
          img.decoding = 'async';
          mediaWrap.appendChild(img);
          div.appendChild(mediaWrap);
        }

        var label = document.createElement('span');
        label.className   = 'mosaic-label';
        label.textContent = projects[pi].name;
        div.appendChild(label);

        container.appendChild(div);
      }
    }
  }

  // First grid
  buildMosaicLayout(document.getElementById('mosaic'));

  // Infinite scroll: append a new randomised grid when sentinel comes into view
  var sentinel = document.getElementById('scroll-sentinel');
  var appending = false;

  new IntersectionObserver(function(entries) {
    if (!entries[0].isIntersecting || appending) return;
    appending = true;
    var grid = document.createElement('div');
    grid.className = 'mosaic-grid';
    sentinel.parentNode.insertBefore(grid, sentinel);
    buildMosaicLayout(grid);
    appending = false;
  }, { rootMargin: '400px' }).observe(sentinel);

  /* ── Door ─────────────────────────────────────────────── */

  var doorWrap = document.getElementById('door-wrap');
  var isScrollActive = false;
  var hasAutoClosedAfterFirstScroll = false;
  var scrollEndTimer;

  function autoCloseOnFirstUserScroll() {
    if (hasAutoClosedAfterFirstScroll || !isOpen()) return;
    document.body.classList.add('first-auto-close');
    closeDoor();
    hasAutoClosedAfterFirstScroll = true;
  }

  window.addEventListener('scroll', function() {
    isScrollActive = true;
    clearTimeout(scrollEndTimer);
    scrollEndTimer = setTimeout(function() {
      isScrollActive = false;
    }, 160);
  }, { passive: true });

  // Close only on the first real user scroll gesture (not load/layout scroll events).
  window.addEventListener('wheel', autoCloseOnFirstUserScroll, { passive: true });
  window.addEventListener('touchmove', autoCloseOnFirstUserScroll, { passive: true });

  function isOpen()  { return document.body.classList.contains('drawer-open'); }
  function openDoor()  {
    document.body.classList.remove('door-closing');
    document.body.classList.add('drawer-open');
    doorWrap.setAttribute('aria-expanded', 'true');
  }
  function closeDoor() {
    if (!isOpen()) return;
    document.body.classList.add('door-closing');
    document.body.classList.remove('drawer-open');
    doorWrap.setAttribute('aria-expanded', 'false');
  }
  function toggleDoor() { isOpen() ? closeDoor() : openDoor(); }

  // Start with the door open on first load.
  openDoor();

  doorWrap.addEventListener('transitionend', function(e) {
    if (e.propertyName !== 'transform') return;
    if (!isOpen()) {
      document.body.classList.remove('door-closing');
      document.body.classList.remove('first-auto-close');
    }
  });

  doorWrap.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleDoor();
  });

  doorWrap.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    e.preventDefault();
    toggleDoor();
  });

  document.addEventListener('click', function(e) {
    if (isScrollActive) return;
    if (!isOpen()) {
      openDoor();
      return;
    }
    if (doorWrap.contains(e.target)) return;
    closeDoor();
  });

  window.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && isOpen()) closeDoor();
  });
</script>
</body>
</html>
