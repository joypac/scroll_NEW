<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miguel Ortigão — Arquitetura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Clash Display';
      src: url('ClashDisplay-Medium.ttf') format('truetype');
      font-style: normal;
      font-weight: 500;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --drawer-width: clamp(220px, 28vw, 300px);
      --drawer-ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      background: #f5f5f3;
      overflow-x: clip;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
    }

    #site-shell {
      transition: transform 0.35s var(--drawer-ease);
      will-change: transform;
    }

    body.drawer-open #site-shell {
      transform: translateX(var(--drawer-width));
    }

    /* ── Contact toggle line ─────────────────────────────── */

    #contact-toggle {
      position: fixed;
      left: 16px;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      display: grid;
      place-items: center;
      z-index: 60;
      transition: transform 0.35s var(--drawer-ease);
    }

    #contact-toggle::before {
      content: '';
      display: block;
      width: 20px;
      height: 1.5px;
      background: #111;
      transition: transform 0.35s var(--drawer-ease);
    }

    body.drawer-open #contact-toggle {
      transform: translateY(-50%) translateX(var(--drawer-width));
    }

    body.drawer-open #contact-toggle::before {
      transform: rotate(90deg);
    }

    /* ── Drawer ───────────────────────────────────────────── */

    #contact-drawer {
      position: fixed;
      left: 0; top: 0;
      width: var(--drawer-width);
      height: 100vh;
      background: #efefeb;
      border-right: 1px solid rgba(0,0,0,0.07);
      padding: 28px 24px;
      transform: translateX(calc(-1 * var(--drawer-width) - 2px));
      transition: transform 0.35s var(--drawer-ease);
      z-index: 55;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    body.drawer-open #contact-drawer { transform: translateX(0); }

    .drawer-name {
      font-family: 'Clash Display', sans-serif;
      font-size: 1.25rem;
      font-weight: 500;
      color: #111;
      letter-spacing: 0.1em;
      line-height: 1.2;
      text-transform: uppercase;
      text-align: left;
    }

    .drawer-role {
      font-family: 'Clash Display', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: normal;
      text-transform: uppercase;
      color: #111;
      margin: 3px 0 1.4rem;
      text-align: left;
    }

    .drawer-link {
      display: block;
      color: #111;
      text-decoration: none;
      font-size: 0.9rem;
      line-height: 1.5;
      margin-top: 0.15rem;
      width: fit-content;
      border-bottom: none;
      transition: opacity 0.22s;
    }

    .drawer-link:hover { opacity: 0.7; }

    /* ── Mosaic ───────────────────────────────────────────── */

    /*
      3-column grid. Rows size to content (grid-auto-rows: auto).
      align-items: start → cells shrink-wrap their image; no stretching.
      gap: 1px           → hairline separator between cells.
      Images: width 100%, height auto → preserves ratio, no crop.
    */

    #mosaic {
      columns: 3;
      column-gap: 1px;
      background: #f5f5f3;
    }

    .mosaic-cell {
      position: relative;
      background: #f5f5f3;
      overflow: hidden;
      break-inside: avoid;
      margin-bottom: 1px;
    }

    /* Images and videos: full width, natural height — no crop, no forced ratio */
    .mosaic-cell img,
    .mosaic-cell video {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Labels — hidden, kept for future use */
    .mosaic-label {
      display: none;
    }

    @media (max-width: 720px) {
      :root { --drawer-width: min(82vw, 300px); }
      #contact-toggle { left: 10px; }
      #mosaic { columns: 2; }
    }
  </style>
</head>
<body>

<button id="contact-toggle" aria-label="Abrir contacto" aria-controls="contact-drawer" aria-expanded="false"></button>

<aside id="contact-drawer" aria-label="Contacto">
  <div>
    <p class="drawer-name">MIGUEL ORTIGÃO</p>
    <p class="drawer-role">ARQUITETURA</p>
    <a class="drawer-link" href="mailto:mo@miguelortigao.com">mo@miguelortigao.com</a>
    <a class="drawer-link" href="tel:+351930708315">+351 930 708 315</a>
    <a class="drawer-link" href="https://instagram.com/miguelortigao" target="_blank" rel="noreferrer noopener">Instagram</a>
  </div>
</aside>

<div id="site-shell">
  <div id="mosaic"></div>
  <div id="scroll-sentinel"></div>
</div>

<script>
  /* ── Data ─────────────────────────────────────────────────
     Format notes:
       HEIC → Safari/macOS/iOS only
       TIF  → not supported by browsers (convert to JPG)
       MOV  → Safari + Chrome (H.264); may fail on Firefox
  ── */

  var projects = [
    {
      name: 'banco',
      media: [
        { src: 'BANCO1.jpg', type: 'img' },
        { src: 'BANCO2.jpg', type: 'img' },
        { src: 'BANCO3.jpg', type: 'img' }
      ]
    },
    {
      name: 'fairly',
      media: [
        { src: 'fairly1.jpg',   type: 'img' },
        { src: 'fairly2.jpg',   type: 'img' },
        { src: 'fairly3.jpg',   type: 'img' },
        { src: 'fairly5.jpg',   type: 'img' },
        { src: 'FAIRLY9.jpg',   type: 'img' },
        { src: 'FAIRLY10.jpg',  type: 'img' },
        { src: 'FAIRLY11.jpg',  type: 'img' },
        { src: 'FAIRLY12.jpg',  type: 'img' },
        { src: 'FAIRLY13.jpg',  type: 'img' },
        { src: 'FAIRLY16.jpg',  type: 'img' },
        { src: 'FAIRLY17.jpg',  type: 'img' },
        { src: 'FAIRLY31.jpg', type: 'img' },
        { src: 'FAIRLY32.jpg', type: 'img' },
        { src: 'FAIRLY33.jpg', type: 'img' },
        { src: 'FAIRLY34.jpg', type: 'img' },
        { src: 'FAIRLY35.jpg', type: 'img' },
        { src: 'FAIRLY36.jpg', type: 'img' },
        { src: 'FAIRLY37.jpg', type: 'img' },
        { src: 'FAIRLY38.jpg', type: 'img' },
        { src: 'FAIRLY39.jpg', type: 'img' },
        { src: 'FAIRLY41.jpg', type: 'img' },
        { src: 'FAIRLY42.jpg', type: 'img' },
        { src: 'FAIRLY43.jpg', type: 'img' },
        { src: 'FAIRLY18.mov',  type: 'vid' },
        { src: 'FAIRLY19.mov',  type: 'vid' },
        { src: 'FAIRLY20.mov',  type: 'vid' },
        { src: 'FAIRLY21.mov',  type: 'vid' },
        { src: 'FAIRLY22.mov',  type: 'vid' },
        { src: 'FAIRLY23.mov',  type: 'vid' },
        { src: 'FAIRLY24.mov',  type: 'vid' },
        { src: 'FAIRLY25.mov',  type: 'vid' },
        { src: 'FAIRLY26.mov',  type: 'vid' },
        { src: 'FAIRLY27.MOV',  type: 'vid' },
        { src: 'FAIRLY28.MOV',  type: 'vid' },
        { src: 'FAIRLY30.MOV',  type: 'vid' }
      ]
    },
    {
      name: 'mustique',
      media: [
        { src: 'mustique1.jpg',   type: 'img' },
        { src: 'mustique2.jpg',   type: 'img' },
        { src: 'mustique3.jpg',   type: 'img' },
        { src: 'mustique4.jpg',   type: 'img' },
        { src: 'mustique5.jpg',   type: 'img' },
        { src: 'MUSTIQUE7.jpg',  type: 'img' },
        { src: 'MUSTIQUE9.jpg',  type: 'img' },
        { src: 'MUSTIQUE13.jpg', type: 'img' },
        { src: 'MUSTIQUE14.jpg', type: 'img' },
        { src: 'MUSTIQUE15.jpg', type: 'img' },
        { src: 'MUSTIQUE16.jpg', type: 'img' },
        { src: 'MUSTIQUE17.jpg', type: 'img' },
        { src: 'MUSTIQUE18.jpg', type: 'img' },
        { src: 'MUSTIQUE19.jpg', type: 'img' },
        { src: 'MUSTIQUE20.jpg', type: 'img' },
        { src: 'MUSTIQUE21.jpg', type: 'img' },
        { src: 'MUSTIQUE22.jpg', type: 'img' },
        { src: 'MUSTIQUE23.jpg', type: 'img' },
        { src: 'MUSTIQUE24.jpg', type: 'img' },
        { src: 'MUSTIQUE27.jpg', type: 'img' },
        { src: 'MUSTIQUE28.jpg', type: 'img' },
        { src: 'MUSTIQUE29.jpg', type: 'img' }
      ]
    },
    {
      name: 'paez',
      media: [
        { src: 'paez1.jpg',       type: 'img' },
        { src: 'paez2.jpg',       type: 'img' },
        { src: 'paez3.jpg',       type: 'img' },
        { src: 'paez4.jpg',       type: 'img' },
        { src: 'paez5.jpg',       type: 'img' },
        { src: 'PAEZ8.jpg',   type: 'img' },
        { src: 'PAEZ9.jpg',   type: 'img' },
        { src: 'PAEZ10.jpg',  type: 'img' },
        { src: 'PAEZ11.jpg',  type: 'img' },
        { src: 'PAEZ12.jpg',  type: 'img' },
        { src: 'PAEZ13.jpg',  type: 'img' },
        { src: 'PAEZ14.jpg',  type: 'img' },
        { src: 'PAEZ15.jpg',  type: 'img' },
        { src: 'PAEZ16.jpg',  type: 'img' },
        { src: 'PAEZ17.jpg',  type: 'img' },
        { src: 'PAEZ18.jpg',  type: 'img' },
        { src: 'PAEZ19.jpg',  type: 'img' },
        { src: 'paez_9fev.mov', type: 'vid' }
      ]
    },
    {
      name: 'peça',
      media: [
        { src: 'PEÇA1.jpg', type: 'img' },
        { src: 'PECA2.jpg', type: 'img' },
        { src: 'PEÇA3.jpg', type: 'img' }
      ]
    },
    {
      name: 'lapa lofts',
      media: [
        { src: 'LAPA_LOFTS.MOV', type: 'vid' }
      ]
    }
  ];

  /* ── Helpers ──────────────────────────────────────────── */

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  /* ── Render ───────────────────────────────────────────── */

  // Shared IntersectionObserver for all video tiles across all grids
  var vidObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      var v = e.target.querySelector('video');
      if (!v) return;
      if (e.isIntersecting) v.play().catch(function() {});
      else v.pause();
    });
  }, { threshold: 0.15 });

  function makeCell(item, projectName) {
    var div = document.createElement('div');
    div.className = 'mosaic-cell' + (item.type === 'vid' ? ' is-video' : '');

    if (item.type === 'vid') {
      var video = document.createElement('video');
      video.muted = true;
      video.loop  = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('preload', 'metadata');
      var vsrc = document.createElement('source');
      vsrc.src = item.src;
      video.appendChild(vsrc);
      div.appendChild(video);
      vidObs.observe(div);
    } else {
      var img = document.createElement('img');
      img.src      = item.src;
      img.alt      = projectName;
      img.loading  = 'lazy';
      img.decoding = 'async';
      div.appendChild(img);
    }

    var label = document.createElement('span');
    label.className   = 'mosaic-label';
    label.textContent = projectName;
    div.appendChild(label);

    return div;
  }

  var mosaic = document.getElementById('mosaic');

  function appendBatch() {
    var order = shuffle(projects.map(function(_, i) { return i; }));
    order.forEach(function(pi) {
      var p     = projects[pi];
      var media = shuffle(p.media.slice());
      media.forEach(function(item) {
        mosaic.appendChild(makeCell(item, p.name));
      });
    });
  }

  // First batch
  appendBatch();

  // Infinite scroll: append more items to the existing columns
  var sentinel  = document.getElementById('scroll-sentinel');
  var appending = false;

  new IntersectionObserver(function(entries) {
    if (!entries[0].isIntersecting || appending) return;
    appending = true;
    appendBatch();
    appending = false;
  }, { rootMargin: '400px' }).observe(sentinel);

  /* ── Drawer ───────────────────────────────────────────── */

  var drawerToggle = document.getElementById('contact-toggle');
  var drawer       = document.getElementById('contact-drawer');

  function isDrawerOpen() { return document.body.classList.contains('drawer-open'); }
  function openDrawer()   { document.body.classList.add('drawer-open');    drawerToggle.setAttribute('aria-expanded', 'true'); }
  function closeDrawer()  { document.body.classList.remove('drawer-open'); drawerToggle.setAttribute('aria-expanded', 'false'); }

  drawerToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    if (isDrawerOpen()) closeDrawer(); else openDrawer();
  });

  drawer.addEventListener('click', function(e) {
    if (!isDrawerOpen()) return;
    var sel = window.getSelection && window.getSelection();
    if (sel && !sel.isCollapsed) return;
    if (e.target.closest('a')) return;
    closeDrawer();
  });

  document.addEventListener('click', function(e) {
    if (!isDrawerOpen()) return;
    var sel = window.getSelection && window.getSelection();
    if (sel && !sel.isCollapsed) return;
    if (e.target === drawerToggle || drawer.contains(e.target)) return;
    closeDrawer();
  });

  window.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && isDrawerOpen()) closeDrawer();
  });
</script>
</body>
</html>
